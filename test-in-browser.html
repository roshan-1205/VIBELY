<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBELY Backend Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .test-result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { background-color: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        button { padding: 10px 20px; margin: 10px 5px; font-size: 16px; cursor: pointer; }
        .btn-primary { background-color: #007bff; color: white; border: none; border-radius: 5px; }
        .btn-success { background-color: #28a745; color: white; border: none; border-radius: 5px; }
        pre { background-color: #f8f9fa; padding: 15px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 VIBELY Backend Test</h1>
    <p>This page will test your backend endpoints directly in the browser.</p>
    
    <div id="results"></div>
    
    <button class="btn-primary" onclick="testHealth()">Test Health Endpoint</button>
    <button class="btn-primary" onclick="testRoot()">Test Root Endpoint</button>
    <button class="btn-success" onclick="testLogin()">Test Login Flow</button>
    
    <h2>Manual Tests:</h2>
    <p>Click these links to test manually:</p>
    <ul>
        <li><a href="https://vibely-backend.onrender.com/" target="_blank">Backend Root</a></li>
        <li><a href="https://vibely-backend.onrender.com/api/health" target="_blank">Health Check</a></li>
        <li><a href="https://vibely-1205.web.app/signin" target="_blank">Frontend Login</a></li>
        <li><a href="https://vibely-1205.web.app/signup" target="_blank">Frontend Signup</a></li>
    </ul>

    <script>
        const resultsDiv = document.getElementById('results');
        
        function addResult(message, type = 'loading') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.innerHTML = message;
            resultsDiv.appendChild(div);
            return div;
        }
        
        async function testHealth() {
            const resultDiv = addResult('🔄 Testing health endpoint...', 'loading');
            
            try {
                const response = await fetch('https://vibely-backend.onrender.com/api/health', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.className = 'test-result success';
                    resultDiv.innerHTML = `
                        ✅ Health endpoint working!<br>
                        Status: ${response.status}<br>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.className = 'test-result error';
                    resultDiv.innerHTML = `❌ Health endpoint failed: ${response.status} ${response.statusText}`;
                }
            } catch (error) {
                resultDiv.className = 'test-result error';
                resultDiv.innerHTML = `❌ Health endpoint error: ${error.message}`;
            }
        }
        
        async function testRoot() {
            const resultDiv = addResult('🔄 Testing root endpoint...', 'loading');
            
            try {
                const response = await fetch('https://vibely-backend.onrender.com/', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.className = 'test-result success';
                    resultDiv.innerHTML = `
                        ✅ Root endpoint working!<br>
                        Status: ${response.status}<br>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.className = 'test-result error';
                    resultDiv.innerHTML = `❌ Root endpoint failed: ${response.status} ${response.statusText}`;
                }
            } catch (error) {
                resultDiv.className = 'test-result error';
                resultDiv.innerHTML = `❌ Root endpoint error: ${error.message}`;
            }
        }
        
        async function testLogin() {
            const resultDiv = addResult('🔄 Testing login endpoint...', 'loading');
            
            try {
                const response = await fetch('https://vibely-backend.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'testpassword'
                    })
                });
                
                const data = await response.json();
                
                if (response.status === 400 || response.status === 401) {
                    // Expected for invalid credentials
                    resultDiv.className = 'test-result success';
                    resultDiv.innerHTML = `
                        ✅ Login endpoint responding correctly!<br>
                        Status: ${response.status} (Expected for invalid credentials)<br>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else if (response.ok) {
                    resultDiv.className = 'test-result success';
                    resultDiv.innerHTML = `
                        ✅ Login endpoint working!<br>
                        Status: ${response.status}<br>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.className = 'test-result error';
                    resultDiv.innerHTML = `❌ Login endpoint failed: ${response.status} ${response.statusText}<br><pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (error) {
                resultDiv.className = 'test-result error';
                resultDiv.innerHTML = `❌ Login endpoint error: ${error.message}`;
            }
        }
        
        // Auto-run health test on page load
        window.onload = function() {
            addResult('🚀 Backend test page loaded. Click buttons above to test endpoints.', 'loading');
            setTimeout(testHealth, 1000);
        };
    </script>
</body>
</html>
